name: "Export Godot Project to Android"
on: [workflow_dispatch]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.1.stable/
          rm -f Godot_v4.2.1-stable_export_templates.tpz

      - name: Android Export
        run: |
          # project.godotがあるフォルダを探して移動
          PROJECT_DIR=$(find . -name "project.godot" -exec dirname {} \;)
          cd "$PROJECT_DIR"
          # その場に「game.apk」としてエクスポート
          godot --headless --export-release "Android" game.apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BowleraramaXR-Android-APK
          # リポジトリ内のどこに生成されても、自動で見つけてアップロードする指定
          path: "**/game.apk"
