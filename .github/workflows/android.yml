name: "Export Godot Project to Android"
on: [workflow_dispatch]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    # 最初からAndroid SDK（道具箱）がすべて同梱されている環境に変更します
    container:
      image: barichello/godot-ci:4.2.1-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Android Export
        run: |
          # 1. project.godot があるフォルダを探す
          PROJECT_DIR=$(find . -name "project.godot" -exec dirname {} \;)
          
          # 2. export_presets.cfg を同じ場所に確実にコピーする
          PRESETS_SRC=$(find . -name "export_presets.cfg" | head -n 1)
          if [ -n "$PRESETS_SRC" ] && [ "$PRESETS_SRC" != "$PROJECT_DIR/export_presets.cfg" ]; then
            cp "$PRESETS_SRC" "$PROJECT_DIR/export_presets.cfg"
          fi
          
          # 3. プロジェクトのディレクトリに移動
          cd "$PROJECT_DIR"
          
          # 4. エクスポート用のディレクトリを作成し、そこへ出力する
          mkdir -p build/Android
          godot --headless --export-release "Android" build/Android/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BowleraramaXR-Android-APK
          path: "**/build/Android/game.apk"
