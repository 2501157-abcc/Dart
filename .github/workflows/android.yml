name: "Export Godot Project to Android"
on: [workflow_dispatch]

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          wget https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          unzip Godot_v4.2.1-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.2.1.stable/
          rm -f Godot_v4.2.1-stable_export_templates.tpz

      - name: Android Export
        env:
          # GodotにAndroid SDKの場所を強制的に教え込む設定（ここが重要です！）
          GODOT_ANDROID_SDK_PATH: ${{ env.ANDROID_HOME }}
        run: |
          # 1. project.godot があるフォルダのパスを探す
          PROJECT_DIR=$(find . -name "project.godot" -exec dirname {} \;)
          
          # 2. export_presets.cfg を見つけて、project.godot と同じフォルダにコピーする
          PRESETS_SRC=$(find . -name "export_presets.cfg" | head -n 1)
          if [ -n "$PRESETS_SRC" ] && [ "$PRESETS_SRC" != "$PROJECT_DIR/export_presets.cfg" ]; then
            cp "$PRESETS_SRC" "$PROJECT_DIR/export_presets.cfg"
          fi
          
          # 3. プロジェクトフォルダに移動してエクスポートを実行
          cd "$PROJECT_DIR"
          godot --headless --export-release "Android" game.apk

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BowleraramaXR-Android-APK
          path: "**/game.apk"
